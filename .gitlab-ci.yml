# Note: All jobs run in parallel within the 'test' stage since services are independent.
# To speed up runs further, consider adding caching for node_modules across jobs.

# --------------------
# Build stage - attempt to run `npm run build` where defined
# --------------------
auth_service_build:
  stage: build
  script:
    - cd services/auth-service
    - npm ci --silent
    - if npm run | grep -q " build"; then npm run build; else echo "no build script"; fi

ai_service_build:
  stage: build
  script:
    - cd services/ai-service
    - npm ci --silent
    - if npm run | grep -q " build"; then npm run build; else echo "no build script"; fi

