image: node:18

stages:
  - build
  - test

variables:
  NODE_ENV: test
  CI: "true"

# All jobs run in parallel since they're in the same stage
auth_service:
  stage: test
  needs: [auth_service_build]
  script:
    - cd services/auth-service
    - mkdir -p $CI_PROJECT_DIR/test-reports
    - npm ci --silent
    - npm i jest-junit --no-save --silent
    - JEST_JUNIT_OUTPUT=$CI_PROJECT_DIR/test-reports/auth-service-junit.xml npx jest --reporters=default --reporters=jest-junit --runInBand --testTimeout=120000 --silent || true
  tags: []
  artifacts:
    when: always
    reports:
      junit: test-reports/auth-service-junit.xml
    paths:
      - test-reports/auth-service-junit.xml
      - services/auth-service/coverage/

