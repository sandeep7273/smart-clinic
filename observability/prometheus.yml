# Prometheus scrape configuration — Smart Clinic
#
# Scrapes /metrics from every microservice and the API Gateway.
# When running services locally (not Docker), host.docker.internal resolves
# to the host machine; change to 'localhost' if Prometheus runs on host too.

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: "smart-clinic-local"
    env: "development"

scrape_configs:
  # API Gateway
  - job_name: "api-gateway"
    static_configs:
      - targets: ["host.docker.internal:3000"]
    metrics_path: /metrics
    scheme: http

  # Auth Service
  - job_name: "auth-service"
    static_configs:
      - targets: ["host.docker.internal:4001"]
    metrics_path: /metrics

  # Doctor Service
  - job_name: "doctor-service"
    static_configs:
      - targets: ["host.docker.internal:4003"]
    metrics_path: /metrics

  # Appointment Service
  - job_name: "appointment-service"
    static_configs:
      - targets: ["host.docker.internal:4004"]
    metrics_path: /metrics

  # AI Service
  - job_name: "ai-service"
    static_configs:
      - targets: ["host.docker.internal:4005"]
    metrics_path: /metrics

  # Prometheus self-monitoring
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
