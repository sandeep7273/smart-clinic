# Prometheus scrape configuration — Smart Clinic (LOCAL DEV)
#
# Used by docker-compose.observability.yml for local development.
# In production, the OTel Collector scrapes /metrics instead (see otel-collector-config.yaml).
#
# Service ports (confirmed from .env files):
#   api-gateway:         3000
#   auth-service:        4001
#   doctor-service:      4002
#   appointment-service: 4003
#   ai-service:          4004
#
# host.docker.internal resolves to the host machine from inside Docker.
# If Prometheus runs directly on the host, change targets to "localhost:<port>".

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: "smart-clinic-local"
    env: "development"

scrape_configs:
  - job_name: "api-gateway"
    static_configs:
      - targets: ["host.docker.internal:3000"]
        labels: { service: "api-gateway" }
    metrics_path: /metrics

  - job_name: "auth-service"
    static_configs:
      - targets: ["host.docker.internal:4001"]
        labels: { service: "auth-service" }
    metrics_path: /metrics

  - job_name: "doctor-service"
    static_configs:
      - targets: ["host.docker.internal:4002"]
        labels: { service: "doctor-service" }
    metrics_path: /metrics

  - job_name: "appointment-service"
    static_configs:
      - targets: ["host.docker.internal:4003"]
        labels: { service: "appointment-service" }
    metrics_path: /metrics

  - job_name: "ai-service"
    static_configs:
      - targets: ["host.docker.internal:4004"]
        labels: { service: "ai-service" }
    metrics_path: /metrics

  - job_name: "otel-collector"
    static_configs:
      - targets: ["host.docker.internal:8888"]
        labels: { service: "otel-collector" }
    metrics_path: /metrics

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
