###############################################################################
# Reusable workflow — Build, scan, push to ECR, deploy to ECS
###############################################################################
name: Build and Deploy Service

on:
  workflow_call:
    inputs:
      service_name:
        description: "Service name (e.g. auth-service)"
        required: true
        type: string
      service_dir:
        description: "Path to service directory (e.g. services/auth-service)"
        required: true
        type: string
      container_port:
        description: "Container port"
        required: true
        type: string
      ecs_cluster:
        description: "ECS cluster name"
        required: true
        type: string
      environment:
        description: "Target environment (dev | prod)"
        required: true
        type: string
    secrets:
      AWS_ACCOUNT_ID:
        required: true
      AWS_REGION:
        required: true
      AWS_ROLE_ARN:
        required: true

jobs:
  # ── 1. Test ───────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ${{ inputs.service_dir }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ inputs.service_dir }}
        run: npm ci

      # Use test:ci if available, fall back to test
      - name: Run tests
        working-directory: ${{ inputs.service_dir }}
        run: npm run test:ci
        env:
          NODE_ENV: test

      - name: Lint
        working-directory: ${{ inputs.service_dir }}
        run: npm run lint --if-present || true

  # ── 2. Build, Scan, Push ─────────────────────────────────────────────────
  build-and-push:
    name: Build & Push
    needs: test
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      security-events: write   # needed for upload-sarif
    outputs:
      image_uri: ${{ steps.build.outputs.image_uri }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        id: build
        working-directory: ${{ inputs.service_dir }}
        env:
          ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com
          ECR_REPO: smartclinic/${{ inputs.service_name }}
        run: |
          IMAGE_TAG="${{ github.sha }}"
          IMAGE_URI="${ECR_REGISTRY}/${ECR_REPO}:${IMAGE_TAG}"

          docker build \
            --cache-from "${ECR_REGISTRY}/${ECR_REPO}:latest" \
            --build-arg BUILD_DATE="$(date -u +'%Y-%m-%dT%H:%M:%SZ')" \
            --build-arg VCS_REF="${{ github.sha }}" \
            -t "${IMAGE_URI}" \
            -t "${ECR_REGISTRY}/${ECR_REPO}:latest" \
            . || docker build \
            --build-arg BUILD_DATE="$(date -u +'%Y-%m-%dT%H:%M:%SZ')" \
            --build-arg VCS_REF="${{ github.sha }}" \
            -t "${IMAGE_URI}" \
            -t "${ECR_REGISTRY}/${ECR_REPO}:latest" \
            .

          echo "image_uri=${IMAGE_URI}" >> $GITHUB_OUTPUT
          echo "ecr_registry=${ECR_REGISTRY}" >> $GITHUB_OUTPUT
          echo "ecr_repo=${ECR_REPO}" >> $GITHUB_OUTPUT

      # Note: Trivy scan removed — ECR scan_on_push=true handles vulnerability
      # scanning at the registry level automatically on every image push.

      - name: Push image to ECR
        env:
          ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com
          ECR_REPO: smartclinic/${{ inputs.service_name }}
        run: |
          docker push "${{ steps.build.outputs.image_uri }}"
          docker push "${ECR_REGISTRY}/${ECR_REPO}:latest"

  # ── 3. Deploy to ECS ─────────────────────────────────────────────────────
  deploy:
    name: Deploy
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Download current task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition "smartclinic-${{ inputs.environment }}-${{ inputs.service_name }}" \
            --query taskDefinition \
            > task-definition.json

      - name: Update image in task definition
        id: render-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: ${{ inputs.service_name }}
          image: ${{ needs.build-and-push.outputs.image_uri }}

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.render-task-def.outputs.task-definition }}
          service: ${{ inputs.service_name }}
          cluster: ${{ inputs.ecs_cluster }}
          wait-for-service-stability: true

      - name: Smoke test
        run: |
          sleep 20
          ALB_DNS="${{ vars.ALB_DNS_NAME }}"
          if [ -n "$ALB_DNS" ]; then
            STATUS=$(curl -sf -o /dev/null -w "%{http_code}" \
              "http://${ALB_DNS}/health" --max-time 10 || echo "000")
            echo "ALB health check: HTTP ${STATUS}"
          fi

      - name: Summary
        run: |
          echo "### Deployment Complete :rocket:" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Service | \`${{ inputs.service_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | \`${{ inputs.environment }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Image | \`${{ needs.build-and-push.outputs.image_uri }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Cluster | \`${{ inputs.ecs_cluster }}\` |" >> $GITHUB_STEP_SUMMARY
