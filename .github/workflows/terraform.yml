name: Terraform — Plan & Apply

on:
  push:
    branches: [main, master, develop]
    paths:
      - "infrastructure/terraform/**"
      - ".github/workflows/terraform.yml"
  pull_request:
    branches: [main, master, develop]
    paths:
      - "infrastructure/terraform/**"
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "dev"
        type: choice
        options: [dev, prod]
      action:
        description: "Terraform action"
        required: true
        default: "plan"
        type: choice
        options: [plan, apply, destroy]

env:
  TF_VERSION: "1.6.6"
  ENVIRONMENT: ${{ github.event.inputs.environment || 'dev' }}

jobs:
  terraform:
    name: Terraform ${{ github.event.inputs.action || (github.event_name == 'pull_request' && 'plan') || 'apply' }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      pull-requests: write # post plan output as PR comment

    defaults:
      run:
        working-directory: infrastructure/terraform

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Plan
        id: plan
        run: |
          terraform plan \
            -var-file="environments/${{ env.ENVIRONMENT }}/terraform.tfvars" \
            -var="jwt_secret=${{ secrets.JWT_SECRET }}" \
            -var="mongodb_uri=${{ secrets.MONGODB_URI }}" \
            -var="groq_api_key=${{ secrets.GROQ_API_KEY }}" \
            -out=tfplan \
            -no-color 2>&1 | tee plan-output.txt

      - name: Post plan output to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('infrastructure/terraform/plan-output.txt', 'utf8');
            const maxLength = 60000;
            const truncated = plan.length > maxLength
              ? plan.substring(0, maxLength) + '\n\n... (truncated)'
              : plan;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Terraform Plan — \`${{ env.ENVIRONMENT }}\`\n\`\`\`hcl\n${truncated}\n\`\`\``
            });

      - name: Terraform Apply
        if: |
          (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
          (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply')
        run: terraform apply -auto-approve tfplan

      - name: Terraform Destroy (manual only — requires explicit trigger)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'destroy'
        run: |
          terraform destroy \
            -var-file="environments/${{ env.ENVIRONMENT }}/terraform.tfvars" \
            -var="jwt_secret=${{ secrets.JWT_SECRET }}" \
            -var="mongodb_uri=${{ secrets.MONGODB_URI }}" \
            -var="groq_api_key=${{ secrets.GROQ_API_KEY }}" \
            -auto-approve
