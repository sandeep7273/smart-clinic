name: Terraform — Plan & Apply

on:
  push:
    branches: [main, master, develop]
    paths:
      - "infrastructure/terraform/**"
      - ".github/workflows/terraform.yml"
  pull_request:
    branches: [main, master, develop]
    paths:
      - "infrastructure/terraform/**"
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "dev"
        type: choice
        options: [dev, prod]
      action:
        description: "Terraform action"
        required: true
        default: "plan"
        type: choice
        options: [plan, apply, destroy]

env:
  TF_VERSION: "1.15.8"
  ENVIRONMENT: ${{ github.event.inputs.environment || 'dev' }}

jobs:
  terraform:
    name: Terraform ${{ github.event.inputs.action || (github.event_name == 'pull_request' && 'plan') || 'apply' }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      pull-requests: write # post plan output as PR comment

    defaults:
      run:
        working-directory: infrastructure/terraform

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Terraform Init
        run: terraform init -reconfigure

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Generate terraform.tfvars from secrets
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
        run: |
          # Derive per-service MongoDB URIs from base URI
          BASE_HOST=$(echo "${MONGODB_URI}" | sed 's|\(mongodb+srv://[^@]*@[^/]*\).*|\1|')
          QP="appName=Cluster0"
          REGISTRY="${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com"

          # Look up the latest pushed image tag for each service in ECR.
          # Falls back to PLACEHOLDER only when ECR has no image yet (first-ever deploy).
          # This prevents Terraform apply from overwriting a live image with PLACEHOLDER.
          get_latest_image() {
            local repo="smartclinic/$1"
            local tag
            tag=$(aws ecr describe-images --repository-name "$repo" \
              --query 'sort_by(imageDetails, &imagePushedAt)[-1].imageTags[0]' \
              --output text 2>/dev/null || true)
            if [ -z "$tag" ] || [ "$tag" = "None" ] || [ "$tag" = "null" ]; then
              echo "PLACEHOLDER"
            else
              echo "${REGISTRY}/${repo}:${tag}"
            fi
          }

          API_GW_IMAGE=$(get_latest_image api-gateway)
          AUTH_IMAGE=$(get_latest_image auth-service)
          DOCTOR_IMAGE=$(get_latest_image doctor-service)
          APPT_IMAGE=$(get_latest_image appointment-service)
          AI_IMAGE=$(get_latest_image ai-service)

          mkdir -p environments/${{ env.ENVIRONMENT }}
          cat > environments/${{ env.ENVIRONMENT }}/terraform.tfvars << EOF
          environment        = "${{ env.ENVIRONMENT }}"
          aws_region         = "${{ vars.AWS_REGION }}"
          project            = "smartclinic"
          vpc_cidr           = "10.0.0.0/16"
          availability_zones = ["ap-south-1a", "ap-south-1b"]
          acm_certificate_arn = ""

          api_gateway_image         = "${API_GW_IMAGE}"
          auth_service_image        = "${AUTH_IMAGE}"
          doctor_service_image      = "${DOCTOR_IMAGE}"
          appointment_service_image = "${APPT_IMAGE}"
          ai_service_image          = "${AI_IMAGE}"

          jwt_secret   = "${JWT_SECRET}"
          groq_api_key = "${GROQ_API_KEY}"

          mongodb_uris = {
            "auth-service"        = "${BASE_HOST}/auth_db?${QP}"
            "doctor-service"      = "${BASE_HOST}/doctor_db?${QP}"
            "appointment-service" = "${BASE_HOST}/appointment_service?${QP}"
            "ai-service"          = "${BASE_HOST}/ai_db?${QP}"
          }

          api_gateway_min_tasks          = 1
          api_gateway_max_tasks          = 3
          auth_service_min_tasks         = 1
          auth_service_max_tasks         = 2
          doctor_service_min_tasks       = 1
          doctor_service_max_tasks       = 4
          appointment_service_min_tasks  = 1
          appointment_service_max_tasks  = 6
          ai_service_min_tasks           = 1
          ai_service_max_tasks           = 4
          alert_email = ""
          EOF

      - name: Terraform Plan
        id: plan
        run: |
          terraform plan \
            -var-file="environments/${{ env.ENVIRONMENT }}/terraform.tfvars" \
            -out=tfplan \
            -no-color 2>&1 | tee plan-output.txt

      - name: Post plan output to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('infrastructure/terraform/plan-output.txt', 'utf8');
            const maxLength = 60000;
            const truncated = plan.length > maxLength
              ? plan.substring(0, maxLength) + '\n\n... (truncated)'
              : plan;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Terraform Plan — \`${{ env.ENVIRONMENT }}\`\n\`\`\`hcl\n${truncated}\n\`\`\``
            });

      - name: Terraform Apply
        if: |
          steps.plan.outcome == 'success' &&
          (
            (github.event_name == 'push' && contains(fromJSON('["refs/heads/main","refs/heads/master","refs/heads/develop"]'), github.ref)) ||
            (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply')
          )
        run: terraform apply -auto-approve tfplan

      - name: Upload errored Terraform state
        if: failure() && hashFiles('infrastructure/terraform/errored.tfstate') != ''
        uses: actions/upload-artifact@v4
        with:
          name: terraform-errored-state-${{ env.ENVIRONMENT }}-${{ github.run_id }}
          path: infrastructure/terraform/errored.tfstate
          retention-days: 7

      - name: Terraform Destroy (manual only — requires explicit trigger)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'destroy'
        run: |
          terraform destroy \
            -var-file="environments/${{ env.ENVIRONMENT }}/terraform.tfvars" \
            -auto-approve
