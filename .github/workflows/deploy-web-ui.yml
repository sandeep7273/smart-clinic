name: Deploy — Web UI (S3 + CloudFront)

on:
  push:
    branches: [main, master, develop]
    paths:
      - "web_ui_app/**"
      - ".github/workflows/deploy-web-ui.yml"
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "dev"
        type: choice
        options: [dev, prod]

env:
  ENVIRONMENT: ${{ github.event.inputs.environment || 'dev' }}

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web_ui_app/package-lock.json

      - name: Install dependencies
        working-directory: web_ui_app
        run: npm ci

      - name: Build
        working-directory: web_ui_app
        env:
          VITE_API_URL: ${{ vars.API_GATEWAY_URL }} # set in GitHub environment vars
          VITE_ENV: ${{ env.ENVIRONMENT }}
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Deploy to S3
        run: |
          # Hashed assets — cache forever (immutable)
          aws s3 sync web_ui_app/dist/ \
            s3://smartclinic-${{ env.ENVIRONMENT }}-web-ui/ \
            --delete \
            --cache-control "public,max-age=31536000,immutable" \
            --exclude "index.html"

          # index.html — never cache (always serve fresh)
          aws s3 cp web_ui_app/dist/index.html \
            s3://smartclinic-${{ env.ENVIRONMENT }}-web-ui/index.html \
            --cache-control "no-cache,no-store,must-revalidate"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
