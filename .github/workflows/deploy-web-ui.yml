name: Deploy — Web UI (S3)

on:
  push:
    branches: [master]
    paths:
      - "web_ui_app/**"
      - ".github/workflows/deploy-web-ui.yml"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  S3_BUCKET: smartclinic-web-ui-${{ secrets.AWS_ACCOUNT_ID }}-aps1
  ALB_URL: http://smartclinic-dev-alb-1797412677.ap-south-1.elb.amazonaws.com

jobs:
  deploy:
    name: Build & Deploy Web UI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web_ui_app

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web_ui_app/package-lock.json

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        run: npm run build
        env:
          VITE_API_BASE_URL: ${{ env.ALB_URL }}/api
          VITE_GRAPHQL_URL: ${{ env.ALB_URL }}/graphql
          VITE_API_TIMEOUT: "30000"

      - name: Create S3 bucket if not exists
        run: |
          aws s3api head-bucket --bucket $S3_BUCKET 2>/dev/null || \
          aws s3api create-bucket \
            --bucket $S3_BUCKET \
            --region ${{ vars.AWS_REGION }} \
            --create-bucket-configuration LocationConstraint=${{ vars.AWS_REGION }}

      - name: Configure S3 static website hosting
        run: |
          aws s3api put-bucket-ownership-controls \
            --bucket $S3_BUCKET \
            --ownership-controls Rules=[{ObjectOwnership=BucketOwnerPreferred}]

          aws s3api put-public-access-block \
            --bucket $S3_BUCKET \
            --public-access-block-configuration \
              BlockPublicAcls=false,IgnorePublicAcls=false,BlockPublicPolicy=false,RestrictPublicBuckets=false

          aws s3api put-bucket-website \
            --bucket $S3_BUCKET \
            --website-configuration \
              '{"IndexDocument":{"Suffix":"index.html"},"ErrorDocument":{"Key":"index.html"}}'

          aws s3api put-bucket-policy \
            --bucket $S3_BUCKET \
            --policy "{\"Version\":\"2012-10-17\",\"Statement\":[{\"Sid\":\"PublicRead\",\"Effect\":\"Allow\",\"Principal\":\"*\",\"Action\":\"s3:GetObject\",\"Resource\":\"arn:aws:s3:::$S3_BUCKET/*\"}]}"

      - name: Sync build to S3
        run: |
          aws s3 sync dist/ s3://$S3_BUCKET/ \
            --delete \
            --cache-control "public,max-age=31536000,immutable" \
            --exclude "index.html"

          aws s3 cp dist/index.html s3://$S3_BUCKET/index.html \
            --cache-control "no-cache,no-store,must-revalidate" \
            --content-type "text/html"

      - name: Invalidate CloudFront cache
        if: vars.WEB_CDN_DISTRIBUTION_ID != ''
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ vars.WEB_CDN_DISTRIBUTION_ID }}" \
            --paths "/index.html" "/assets/*"

      - name: Output website URL
        run: |
          echo "✅ Web UI deployed!"
          echo "🌐 URL: http://$S3_BUCKET.s3-website.${{ vars.AWS_REGION }}.amazonaws.com"
          if [ -n "${{ vars.WEB_CDN_DOMAIN_NAME }}" ]; then
            echo "⚡ CDN: https://${{ vars.WEB_CDN_DOMAIN_NAME }}"
          fi
