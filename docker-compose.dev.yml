###############################################################################
# Docker Compose - Development Configuration
# 
# This configuration exposes ALL service ports for local development and debugging
# 
# Usage: docker-compose -f docker-compose.dev.yml up
# 
# WARNING: DO NOT use this configuration in production!
# Use the default docker-compose.yml for production deployments
###############################################################################

services:
  # ============================================================================
  # INFRASTRUCTURE SERVICES
  # ============================================================================
  
  zookeeper:
    image: wurstmeister/zookeeper:latest
    ports:
      - "2181:2181"  # Exposed for development

  kafka:
    image: wurstmeister/kafka:latest
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"  # Exposed for development
    environment:
      KAFKA_ADVERTISED_HOST_NAME: kafka
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092

  redis:
    image: redis:7
    ports:
      - "6379:6379"  # Exposed for development

  mongodb:
    image: mongo:6.0
    ports:
      - "27017:27017"  # Exposed for development
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
    volumes:
      - mongodb_data:/data/db

  # ============================================================================
  # API GATEWAY - PUBLIC FACING SERVICE
  # ============================================================================
  
  api-gateway:
    image: kubsandeep/api-gateway-1000:latest
    ports:
      - "3000:3000"
    env_file:
      - api-gateway/.env.gateway
    depends_on:
      auth-service:
        condition: service_healthy
      doctor-service:
        condition: service_healthy
      appointment-service:
        condition: service_healthy
      ai-service:
        condition: service_healthy
    restart: unless-stopped

  # ============================================================================
  # MICROSERVICES - ALL PORTS EXPOSED FOR DEVELOPMENT
  # ============================================================================

  auth-service:
    image: kubsandeep/auth-service-1001:latest
    ports:
      - "4001:4001"  # Exposed for development
    env_file:
      - services/auth-service/.env.auth
    depends_on:
      mongodb:
        condition: service_started
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4001/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  doctor-service:
    image: kubsandeep/doctor-service-1003:latest
    ports:
      - "4003:4003"  # HTTP - Exposed for development
      - "50051:50051"  # gRPC - Exposed for development
    env_file:
      - services/doctor-service/.env.doctor
    depends_on:
      mongodb:
        condition: service_started
      kafka:
        condition: service_started
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4003/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  appointment-service:
    image: kubsandeep/appointment-service-1004:latest
    ports:
      - "4004:4004"  # HTTP - Exposed for development
      - "50052:50052"  # gRPC - Exposed for development
    env_file:
      - services/appointment-service/.env.appointment
    depends_on:
      mongodb:
        condition: service_started
      kafka:
        condition: service_started
      doctor-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4004/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  ai-service:
    image: kubsandeep/ai-service-1005:latest
    ports:
      - "4005:4005"  # Exposed for development
    env_file:
      - services/ai-service/.env.ai
    depends_on:
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4005/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

volumes:
  mongodb_data:
