###############################################################################
# Docker Compose - LOCAL DEVELOPMENT
#
# Mirrors the AWS ECS production setup — same Docker Hub images, same service
# topology — but:
#   • All ports exposed for direct local testing / curl / Postman
#   • .env.dev files used (local MongoDB, relaxed rate limits, debug logs)
#   • MongoDB runs as a local container  (no Atlas required)
#   • Port mismatches from production config are corrected here
#
# Usage:
#   docker-compose -f docker-compose.dev.yml pull           # pull latest images
#   docker-compose -f docker-compose.dev.yml up -d          # start all
#   docker-compose -f docker-compose.dev.yml logs -f <svc>  # tail logs
#   docker-compose -f docker-compose.dev.yml down -v        # stop + wipe volumes
#
# Once running, point the web UI at http://localhost:3000:
#   Set VITE_API_BASE_URL=http://localhost:3000/api in web_ui_app/.env.development
#   Set VITE_GRAPHQL_URL=http://localhost:3000/graphql
###############################################################################

services:
  # ── Infrastructure ────────────────────────────────────────────────────────

  zookeeper:
    image: wurstmeister/zookeeper:latest
    ports:
      - "2181:2181"
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  kafka:
    image: wurstmeister/kafka:latest
    ports:
      - "9092:9092"
    environment:
      KAFKA_ADVERTISED_HOST_NAME: kafka
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_HEAP_OPTS: "-Xmx256M -Xms256M"
    depends_on:
      zookeeper:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions.sh", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 40s
    restart: unless-stopped

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  mongodb:
    image: mongo:6.0
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: admin
    command: ["mongod", "--wiredTigerCacheSizeGB", "0.5"]
    volumes:
      - mongodb_dev_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  # ── Microservices ─────────────────────────────────────────────────────────

  auth-service:
    image: kubsandeep/auth-service-1001:latest
    ports:
      - "4001:4001"
    env_file:
      - services/auth-service/.env.dev
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4001/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  doctor-service:
    image: kubsandeep/doctor-service-1003:latest
    ports:
      - "4003:4003"    # HTTP
      - "50051:50051"  # gRPC
    env_file:
      - services/doctor-service/.env.dev
    depends_on:
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4003/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  appointment-service:
    image: kubsandeep/appointment-service-1004:latest
    ports:
      - "4004:4004"    # HTTP
      - "50052:50052"  # gRPC
    env_file:
      - services/appointment-service/.env.dev
    depends_on:
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy
      doctor-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4004/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  ai-service:
    image: kubsandeep/ai-service-1005:latest
    ports:
      - "4005:4005"
    env_file:
      - services/ai-service/.env.dev
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4005/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  # ── API Gateway ───────────────────────────────────────────────────────────

  api-gateway:
    image: kubsandeep/api-gateway-1000:latest
    ports:
      - "3000:3000"
    env_file:
      - api-gateway/.env.dev
    depends_on:
      auth-service:
        condition: service_healthy
      doctor-service:
        condition: service_healthy
      appointment-service:
        condition: service_healthy
      ai-service:
        condition: service_healthy
    restart: unless-stopped

volumes:
  mongodb_dev_data:
